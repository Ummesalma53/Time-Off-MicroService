name: NestJS CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Fix Permissions
      # Yeh command jest ko chalne ki permission dila degi
      run: chmod +x ./node_modules/.bin/jest

    - name: Run Tests
      run: npm run test